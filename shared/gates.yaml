gates:
  stack:
    phase: STACK_APPROVAL
    command: APPROVE STACK
    artifact: stack.yaml
    required_status: DETECTED
    failure_status: FAILED
    approved_status: APPROVED
    rejected_status: REJECTED
  features:
    phase: FEATURE_APPROVAL
    command: APPROVE FEATURES
    reject_command: REJECT FEATURES
    artifact: features-analysis.md
    approved_status: APPROVED
    rejected_status: REJECTED
  impact:
    phase: IMPACT_APPROVAL
    command: APPROVE IMPACT
    artifact: impact.yaml
    approved_status: APPROVED
    rejected_status: REJECTED
  branch:
    phase: BRANCH_APPROVAL
    command: APPROVE BRANCH
    rename_command: RENAME BRANCH <new-name>
    artifact: git.yaml
    approved_status: APPROVED
    rejected_status: REJECTED
  tasks:
    phase: TASK_APPROVAL
    command: APPROVE TASKS
    artifact: tasks.yaml
    approved_status: APPROVED
    rejected_status: REJECTED
  implementation:
    phase: IMPLEMENTATION_APPROVAL
    command: START IMPLEMENTATION
    artifact: tasks.yaml
    approved_status: APPROVED
