type: object
required: [version, current_phase, skills, gates]
properties:
  version: {type: integer, const: 1}
  current_phase:
    enum: [PROPOSE_BRANCH, BRANCH_APPROVAL, IMPACT_ANALYSIS, IMPACT_APPROVAL, GENERATE_TASKS, TASK_APPROVAL, IMPLEMENTATION_APPROVAL, IMPLEMENTATION, REVIEW, DONE]
  skills:
    type: object
    properties:
      propose-branch: {$ref: "#/$defs/status"}
      impact-analysis: {$ref: "#/$defs/status"}
      generate-tasks: {$ref: "#/$defs/status"}
      implementation: {$ref: "#/$defs/status"}
      review: {$ref: "#/$defs/status"}
  gates:
    type: object
    required: [impact, branch, tasks, implementation]
    properties:
      impact: {$ref: "#/$defs/gate"}
      branch: {$ref: "#/$defs/gate"}
      tasks: {$ref: "#/$defs/gate"}
      implementation: {$ref: "#/$defs/gate"}
$defs:
  status:
    type: object
    required: [status]
    properties:
      status: {enum: [PENDING, RUNNING, DONE, SKIPPED, BLOCKED]}
  gate:
    type: object
    required: [status]
    properties:
      status: {enum: [PENDING, APPROVED, REJECTED, FAILED]}
