type: object
required: [feature, requirements, acceptance_criteria, constraints]
properties:
  feature:
    type: object
    required: [id, name]
    properties:
      id: {type: string, pattern: "^FEAT-[0-9]{3,}$"}
      name: {type: string}
  requirements:
    type: array
    items: {type: string}
  acceptance_criteria:
    type: array
    items: {type: string}
  constraints:
    type: array
    items: {type: string}
