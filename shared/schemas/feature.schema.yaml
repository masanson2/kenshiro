type: object
required: [feature, requirements, acceptance_criteria, constraints]
properties:
  feature:
    type: object
    required: [id, name, branch_type, proposed_branch]
    properties:
      id: {type: string, pattern: "^[0-9]{8}-[0-9]{3}-[a-z0-9]+(-[a-z0-9]+)*$"}
      name: {type: string}
      branch_type: {enum: [FEAT, FIX, REFACTOR, UNKNOWN]}
      proposed_branch: {type: string}
  requirements:
    type: array
    items: {type: string}
  acceptance_criteria:
    type: array
    items: {type: string}
  constraints:
    type: array
    items: {type: string}
