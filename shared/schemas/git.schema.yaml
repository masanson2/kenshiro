type: object
required: [repository, base_branch, feature_branch, git_branch, push, commits]
properties:
  repository: {type: boolean}
  base_branch: {type: string}
  feature_branch:
    type: object
    required: [name, status, current_branch]
    properties:
      name: {type: string}
      status: {enum: [PROPOSED, APPROVED, ACTIVE, FAILED]}
      current_branch: {type: string}
  git_branch:
    type: object
    required: [status]
    properties:
      status: {enum: [PENDING, ACTIVE, FAILED]}
  push: {const: FORBIDDEN}
  commits:
    type: array
    items:
      type: object
      required: [task_id, hash, status]
      properties:
        task_id: {type: string}
        hash: {type: string}
        status: {enum: [CREATED, FAILED]}
