type: object
required: [feature_id, components, api_contract, dependencies, changes, queries, class_diagram, regressions, risk]
properties:
  feature_id: {type: string, pattern: "^[0-9]{8}-[0-9]{3}-[a-z0-9]+(-[a-z0-9]+)*$"}
  components:
    type: object
    properties:
      services: {$ref: "#/$defs/paths"}
      repositories: {$ref: "#/$defs/paths"}
      controllers: {$ref: "#/$defs/paths"}
      apis: {$ref: "#/$defs/paths"}
      schedulers: {$ref: "#/$defs/paths"}
      batch_jobs: {$ref: "#/$defs/paths"}
      database_artifacts: {$ref: "#/$defs/paths"}
      tests: {$ref: "#/$defs/paths"}
  api_contract:
    type: object
    required: [format, path, affected_operations]
    properties:
      format: {enum: [OPENAPI, ASYNCAPI, GRAPHQL_SCHEMA, PROTOBUF, NONE]}
      path: {type: string}
      affected_operations:
        type: array
        items: {type: string}
  dependencies:
    type: array
    items:
      type: object
      required: [from, to, relation]
      properties:
        from: {type: string}
        to: {type: string}
        relation: {type: string}
  changes:
    type: array
    items:
      type: object
      required: [component, as_is, to_be]
      properties:
        component: {type: string}
        as_is: {type: string}
        to_be: {type: string}
  queries:
    type: array
    items:
      type: object
      required: [id, status, location, statement, as_is, to_be]
      properties:
        id: {type: string}
        status: {enum: [NEW, MODIFIED]}
        location: {type: string}
        statement: {type: string}
        as_is: {type: string}
        to_be: {type: string}
  class_diagram: {type: string}
  regressions:
    type: array
    items: {type: string}
  risk: {enum: [LOW, MEDIUM, HIGH]}
$defs:
  paths:
    type: array
    items: {type: string}
