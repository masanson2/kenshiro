requires:
  current_phase: IMPLEMENTATION
  gates:
    stack: APPROVED
    impact: APPROVED
    branch: APPROVED
    tasks: APPROVED
  artifacts:
    - feature.yaml
    - impact.yaml
    - tasks.yaml
    - git.yaml
    - project-index.yaml
  stack:
    build_compile:
      status: DETECTED
      command: required
      quiet: true
    build_test:
      status: DETECTED
      command: required
      quiet: true
  git:
    repository: true
    feature_branch:
      status: ACTIVE
      current_branch: matches_feature_branch
deny_action: source_modification
on_denial:
  workflow_status: BLOCKED
  activity_event: Implementation Blocked
